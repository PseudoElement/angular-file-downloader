<div *ngLet="roomInfo$ | async as roomInfo" class="voice-room-wrapper">
    <h3>Room {{ roomInfo.name }}</h3>

    <div class="info">
        <p>ID: {{ roomInfo.id }}</p>
        <p>Users: {{ roomInfo.users.length + 1 }} / {{ roomInfo.users.max_users }}</p>
    </div>

    <div class="users">
        <!--<ng-container *ngTemplateOutlet="user; context: { userName: roomInfo.me.name, isMe: true }"> </ng-container>-->

        <div class="user">
            <div class="photo">
                <span class="material-symbols-outlined icon"> person </span>
            </div>
            <div class="name">
                <span> {{ roomInfo.me.name }} </span>
            </div>
            <div class="action-bar">
                <span class="material-symbols-outlined action-icon"> volume_off </span>
                <span class="material-symbols-outlined action-icon" (click)="disconnect()"> call_end </span>
            </div>
        </div>

        <ng-container *ngFor="let user of roomInfo.users" class="user">
            <!--<ng-container *ngTemplateOutlet="user; context: { userName: user.name, isMe: false }"> </ng-container>-->
            <div class="user">
                <div class="photo">
                    <span class="material-symbols-outlined icon"> person </span>
                </div>
                <div class="name">
                    <span> {{ user.userName }} </span>
                </div>
                <div class="action-bar">
                    <span class="material-symbols-outlined action-icon"> mic_off </span>
                </div>
            </div>
        </ng-container>
    </div>
</div>

<ng-template #user let-userName="userName" let-isMe="isMe">
    <div class="user">
        <div class="photo">
            <span class="material-symbols-outlined icon"> person </span>
        </div>
        <div class="name">
            <span> {{ userName }} </span>
        </div>
        <div class="action-bar">
            <span *ngIf="isMe" class="material-symbols-outlined action-icon"> volume_off </span>
            <span *ngIf="isMe" class="material-symbols-outlined action-icon" (click)="disconnect()"> call_end </span>

            <span *ngIf="!isMe" class="material-symbols-outlined action-icon"> mic_off </span>
        </div>
    </div>
</ng-template>
